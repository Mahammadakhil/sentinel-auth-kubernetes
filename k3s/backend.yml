apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-backend
  labels:
    app: secure-auth-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-auth-backend
  template:
    metadata:
      labels:
        app: secure-auth-backend
    spec:
      containers:
      - name: secure-auth-backend-container
        image: sentinel-backend:fixed
        imagePullPolicy: Never
        env:
          - name: PYTHONPATH
            value: "/"
        ports:
        - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: secure-auth-backend
  namespace: default
  labels:
    app: secure-auth-backend   # 👈 REQUIRED for ServiceMonitor
spec:
  type: NodePort
  selector:
    app: secure-auth-backend
  ports:
    - name: http              # 👈 VERY IMPORTANT (fixes Prometheus)
      port: 8081
      targetPort: 8081
      nodePort: 30081
